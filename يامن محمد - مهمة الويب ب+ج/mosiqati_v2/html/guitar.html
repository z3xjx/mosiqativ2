<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موسيقاتي | منتجات فئة الجيتار</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<header class="navbar">
    <div class="logo-box">
        <img src="../assets/image/logo.png" alt="شعار موسيقاتي">
    </div>

    <nav class="nav-links">
        <a href="../index.html" data-i18n="home">الصفحة الرئيسية</a>
        <a href="shop.html" data-i18n="shop">المتجر</a>
        <a href="gifts.html" data-i18n="gifts">الهدايا</a>
        <a href="offers.html" data-i18n="offers">العروض الخاصة</a>
        <a href="about.html" data-i18n="about">من نحن</a>
        <a href="contact.html" data-i18n="contact">تواصل معنا</a>
    </nav>

    <div class="site-tools">
        <select id="languageSelect">
            <option value="ar">AR</option>
            <option value="en">EN</option>
            <option value="fr">FR</option>
            <option value="es">ES</option>
        </select>
        <button id="decreaseFont">A-</button>
        <button id="increaseFont">A+</button>
        <button id="themeToggle">🌙</button>
        <button id="cartButton" class="cart-btn">🛒 <span id="cartCount" class="cart-count">0</span></button>
    </div>
</header>

<main class="products-page">
    <h1 data-i18n="guitarPageTitle">منتجات فئة الجيتار</h1>

    <section class="products-wrapper">
        <div class="product-card">
            <img src="../assets/image/guitar-product-1.png" alt="جيتار أكوستيك ياماها">
            <h2 data-i18n="guitar1">جيتار أكوستيك ياماها</h2>
            <p data-i18n="guitar1Price">السعر: 225 دينار</p>
            <button class="add-to-cart" data-price="225" data-type="product" data-i18n="add">إضافة</button>
        </div>

        <div class="product-card">
            <img src="../assets/image/guitar-product-2.png" alt="جيتار كورد أكوستيك">
            <h2 data-i18n="guitar2">جيتار كورد أكوستيك</h2>
            <p data-i18n="guitar2Price">السعر: 125 دينار</p>
            <button class="add-to-cart" data-price="125" data-type="product" data-i18n="add">إضافة</button>
        </div>

        <div class="product-card">
            <img src="../assets/image/guitar-product-3.png" alt="جيتار مارتن أكوستيك">
            <h2 data-i18n="guitar3">جيتار مارتن أكوستيك</h2>
            <p data-i18n="guitar3Price">السعر: 85 دينار</p>
            <button class="add-to-cart" data-price="85" data-type="product" data-i18n="add">إضافة</button>
        </div>
    </section>

    <p class="category-description" data-i18n="guitarDescription">مجموعة من الجيتارات المختارة بعناية لعشاق الموسيقى سواء كنت مبتدئا أو عازفا محترفا</p>
</main>

<script src="../js/main.js"></script>
</body>
</html>
