<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موسيقاتي | الهدايا</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<header class="navbar">
    <div class="logo-box">
        <img src="../assets/image/logo.png" alt="شعار موسيقاتي">
    </div>

    <nav class="nav-links">
        <a href="../index.html" data-i18n="home">الصفحة الرئيسية</a>
        <a href="shop.html" data-i18n="shop">المتجر</a>
        <a href="gifts.html" data-i18n="gifts">الهدايا</a>
        <a href="offers.html" data-i18n="offers">العروض الخاصة</a>
        <a href="about.html" data-i18n="about">من نحن</a>
        <a href="contact.html" data-i18n="contact">تواصل معنا</a>
    </nav>

    <div class="site-tools">
        <select id="languageSelect">
            <option value="ar">AR</option>
            <option value="en">EN</option>
            <option value="fr">FR</option>
            <option value="es">ES</option>
        </select>
        <button id="decreaseFont">A-</button>
        <button id="increaseFont">A+</button>
        <button id="themeToggle">🌙</button>
        <button id="cartButton" class="cart-btn">🛒 <span id="cartCount" class="cart-count">0</span></button>
    </div>
</header>

<main class="gifts-page">
    <h1 data-i18n="giftsTitle">الهدايا</h1>

    <p class="gifts-intro" data-i18n="giftsIntro">
        اختر هدية موسيقية مميزة لأصدقائك وعائلتك من مجموعة موسيقاتي مثل الكوبونات والإكسسوارات الموسيقية
    </p>

    <section class="gifts-wrapper">

        <div class="gift-card">
            <img src="../assets/image/gift-card-10.png" alt="قسيمة قيمة 10 دينار">
            <h2 data-i18n="gift10">قسيمة قيمة 10 دينار</h2>
            <p data-i18n="gift10Price">السعر: 10 دينار</p>
            <button class="add-to-cart" data-name="قسيمة قيمة 10 دينار" data-price="10" data-type="gift" data-image="../assets/image/gift-card-10.png" data-i18n="add">إضافة</button>
        </div>

        <div class="gift-card">
            <img src="../assets/image/gift-card-25.png" alt="قسيمة قيمة 25 دينار">
            <h2 data-i18n="gift25">قسيمة قيمة 25 دينار</h2>
            <p data-i18n="gift25Price">السعر: 25 دينار</p>
            <button class="add-to-cart" data-name="قسيمة قيمة 25 دينار" data-price="25" data-type="gift" data-image="../assets/image/gift-card-25.png" data-i18n="add">إضافة</button>
        </div>

        <div class="gift-card">
            <img src="../assets/image/gift-bag.png" alt="حقيبة بيانو">
            <h2 data-i18n="giftBag">حقيبة بيانو</h2>
            <p data-i18n="giftBagPrice">السعر: 15 دينار</p>
            <button class="add-to-cart" data-name="حقيبة بيانو" data-price="15" data-type="gift" data-image="../assets/image/gift-bag.png" data-i18n="add">إضافة</button>
        </div>

    </section>
</main>

<script src="../js/main.js"></script>
</body>
</html>
