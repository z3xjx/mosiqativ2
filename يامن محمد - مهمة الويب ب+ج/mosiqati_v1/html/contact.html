<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موسيقاتي | تواصل معنا</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

    <header class="navbar">
        <div class="logo-box">
            <img src="../assets/image/logo.png" alt="شعار موسيقاتي">
        </div>

        <nav class="nav-links">
            <a href="../index.html">الصفحة الرئيسية</a>
            <a href="shop.html">المتجر</a>
            <a href="gifts.html">الهدايا</a>
            <a href="offers.html">العروض الخاصة</a>
            <a href="about.html">من نحن</a>
            <a href="contact.html">تواصل معنا</a>
        </nav>
    </header>

    <main class="contact-page">
        <h1>تواصل معنا</h1>

        <p class="contact-intro">
            يسعدنا الرد على أسئلتك ومساعدتك في اختيار الآلة الموسيقية المناسبة
        </p>

        <section class="contact-wrapper">

            <form class="contact-form" id="contactForm" novalidate>
                <label for="name">الاسم الكامل</label>
                <input type="text" id="name" placeholder="اكتب اسمك الكامل">

                <label for="email">البريد الإلكتروني</label>
                <input type="email" id="email" placeholder="example@email.com">

                <label for="phone">رقم الهاتف</label>
                <input type="text" id="phone" placeholder="07XXXXXXXX">

                <label for="message">الاستفسار أو المشكلة</label>
                <textarea id="message" placeholder="اكتب رسالتك هنا"></textarea>

                <p class="form-message" id="formMessage"></p>

                <button type="submit">إرسال الرسالة</button>
            </form>

            <div class="contact-info-box">
                <h2>منصات التواصل</h2>

                <div class="info-item">
                    <span>📧</span>
                    <div>
                        <h3>البريد الإلكتروني</h3>
                        <p>info@mosiqati.jo</p>
                    </div>
                </div>

                <div class="info-item">
                    <span>🌐</span>
                    <div>
                        <h3>الموقع الإلكتروني</h3>
                        <p>mosiqati.jo</p>
                    </div>
                </div>

                <div class="info-item">
                    <span>📞</span>
                    <div>
                        <h3>رقم التواصل</h3>
                        <p>0781689021</p>
                    </div>
                </div>

                <div class="social-links">
                    <a href="#">Instagram</a>
                    <a href="#">Email</a>
                    <a href="#">Phone</a>
                </div>
            </div>

        </section>
    </main>

    <script src="../js/main.js"></script>
</body>
</html>
