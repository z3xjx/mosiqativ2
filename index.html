<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موسيقاتي | الصفحة الرئيسية</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    // Fix Commit
    <header class="navbar">
        <div class="logo-box">
            <img src="assets/image/logo.png" alt="شعار موسيقاتي">
        </div>

        <nav class="nav-links">
            <a href="index.html" data-i18n="home">الصفحة الرئيسية</a>
            <a href="html/shop.html" data-i18n="shop">المتجر</a>
            <a href="html/gifts.html" data-i18n="gifts">الهدايا</a>
            <a href="html/offers.html" data-i18n="offers">العروض الخاصة</a>
            <a href="html/about.html" data-i18n="about">من نحن</a>
            <a href="html/contact.html" data-i18n="contact">تواصل معنا</a>
        </nav>

        <div class="site-tools">
            <select id="languageSelect">
                <option value="ar">AR</option>
                <option value="en">EN</option>
                <option value="fr">FR</option>
                <option value="es">ES</option>
            </select>

            <button id="decreaseFont">A-</button>
            <button id="increaseFont">A+</button>
            <button id="themeToggle">🌙</button>

            <button id="cartButton" class="cart-btn">
                🛒 <span id="cartCount" class="cart-count">0</span>
            </button>
        </div>
    </header>

    <main class="home-page">
        <section class="hero-section">
            <h1 data-i18n="homeTitle">اكتشف عالم الموسيقى مع متجر موسيقاتي</h1>

            <img class="hero-image" src="assets/image/home-guitar.jpg" alt="صورة جيتارات موسيقية">

            <div class="home-actions">
                <a href="html/shop.html" data-i18n="startShopping">ابدأ بالتسوق الآن</a>
                <a href="html/offers.html" data-i18n="viewOffers">شاهد العروض</a>
            </div>
        </section>
    </main>

    <script src="js/main.js"></script>
</body>
</html>
