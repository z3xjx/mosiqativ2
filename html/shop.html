<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موسيقاتي | المتجر</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<header class="navbar">
    <div class="logo-box">
        <img src="../assets/image/logo.png" alt="شعار موسيقاتي">
    </div>

    <nav class="nav-links">
        <a href="../index.html" data-i18n="home">الصفحة الرئيسية</a>
        <a href="shop.html" data-i18n="shop">المتجر</a>
        <a href="gifts.html" data-i18n="gifts">الهدايا</a>
        <a href="offers.html" data-i18n="offers">العروض الخاصة</a>
        <a href="about.html" data-i18n="about">من نحن</a>
        <a href="contact.html" data-i18n="contact">تواصل معنا</a>
    </nav>

    <div class="site-tools">
        <select id="languageSelect">
            <option value="ar">AR</option>
            <option value="en">EN</option>
            <option value="fr">FR</option>
            <option value="es">ES</option>
        </select>
        <button id="decreaseFont">A-</button>
        <button id="increaseFont">A+</button>
        <button id="themeToggle">🌙</button>
        <button id="cartButton" class="cart-btn">🛒 <span id="cartCount" class="cart-count">0</span></button>
    </div>
</header>

<main class="shop-page">
    <section class="shop-intro">
        <h1 data-i18n="shopTitle">المتجر</h1>
        <p data-i18n="shopIntro">
            اختر نوع الآلة الموسيقية التي تبحث عنها وتصفح مجموعة مختارة من أفضل المنتجات المتوفرة في متجر موسيقاتي
        </p>
    </section>

    <section class="category-wrapper">
        <a href="piano.html" class="category-card">
            <img src="../assets/image/piano.png" alt="صورة البيانو">
            <h2 data-i18n="pianoCategory">البيانو</h2>
        </a>

        <a href="guitar.html" class="category-card">
            <img src="../assets/image/guitar.png" alt="صورة الجيتار">
            <h2 data-i18n="guitarCategory">الجيتار</h2>
        </a>

        <a href="drums.html" class="category-card">
            <img src="../assets/image/drums.png" alt="صورة الطبول">
            <h2 data-i18n="drumsCategory">الطبول</h2>
        </a>

        <a href="oud.html" class="category-card">
            <img src="../assets/image/oud.png" alt="صورة العود">
            <h2 data-i18n="oudCategory">العود</h2>
        </a>
    </section>

    <div class="promo-link-box">
        <a href="promo-video.html" data-i18n="promoLink">شاهد الفيديو الترويجي لمنتجات متجر موسيقاتي</a>
    </div>
</main>

<script src="../js/main.js"></script>
</body>
</html>
