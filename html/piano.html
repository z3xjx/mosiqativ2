<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موسيقاتي | منتجات فئة البيانو</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<header class="navbar">
    <div class="logo-box">
        <img src="../assets/image/logo.png" alt="شعار موسيقاتي">
    </div>

    <nav class="nav-links">
        <a href="../index.html" data-i18n="home">الصفحة الرئيسية</a>
        <a href="shop.html" data-i18n="shop">المتجر</a>
        <a href="gifts.html" data-i18n="gifts">الهدايا</a>
        <a href="offers.html" data-i18n="offers">العروض الخاصة</a>
        <a href="about.html" data-i18n="about">من نحن</a>
        <a href="contact.html" data-i18n="contact">تواصل معنا</a>
    </nav>

    <div class="site-tools">
        <select id="languageSelect">
            <option value="ar">AR</option>
            <option value="en">EN</option>
            <option value="fr">FR</option>
            <option value="es">ES</option>
        </select>
        <button id="decreaseFont">A-</button>
        <button id="increaseFont">A+</button>
        <button id="themeToggle">🌙</button>
        <button id="cartButton" class="cart-btn">🛒 <span id="cartCount" class="cart-count">0</span></button>
    </div>
</header>

<main class="products-page">
    <h1 data-i18n="pianoPageTitle">منتجات فئة البيانو</h1>

    <section class="products-wrapper">
        <div class="product-card">
            <img src="../assets/image/piano-product-1.png" alt="بيانو جريتن P9">
            <h2 data-i18n="piano1">بيانو جريتن P9</h2>
            <p data-i18n="piano1Price">السعر: 444 دينار</p>
            <button class="add-to-cart" data-price="444" data-type="product" data-i18n="add">إضافة</button>
        </div>

        <div class="product-card">
            <img src="../assets/image/piano-product-2.png" alt="بيانو كاسيو أسود">
            <h2 data-i18n="piano2">بيانو كاسيو أسود</h2>
            <p data-i18n="piano2Price">السعر: 750 دينار</p>
            <button class="add-to-cart" data-price="750" data-type="product" data-i18n="add">إضافة</button>
        </div>

        <div class="product-card">
            <img src="../assets/image/piano-product-3.png" alt="بيانو كاسيو أبيض">
            <h2 data-i18n="piano3">بيانو كاسيو أبيض</h2>
            <p data-i18n="piano3Price">السعر: 750 دينار</p>
            <button class="add-to-cart" data-price="750" data-type="product" data-i18n="add">إضافة</button>
        </div>
    </section>

    <p class="category-description" data-i18n="pianoDescription">مجموعة من البيانوهات المناسبة للتعلم والتدريب والعزف الاحترافي</p>
</main>

<script src="../js/main.js"></script>
</body>
</html>
